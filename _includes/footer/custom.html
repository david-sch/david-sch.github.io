<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- Open external links and PDFs in a new tab -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('a[href]').forEach(function (a) {
    var href = a.getAttribute('href') || '';
    var external = /^https?:\/\//i.test(href) && a.host !== window.location.host;
    if (external || /\.pdf($|\?)/i.test(href)) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
  });
});
</script>

<!-- "See more" expand/collapse for paper cards -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.see-more').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var panel = btn.nextElementSibling;
      var arrow = btn.querySelector('.see-more-arrow');
      if (panel.hasAttribute('hidden')) {
        panel.removeAttribute('hidden');
        btn.setAttribute('aria-expanded', 'true');
        btn.setAttribute('aria-label', 'Hide paper details');
        btn.setAttribute('title', 'Hide details');
        if (arrow) arrow.innerHTML = '&#8896;';
      } else {
        panel.setAttribute('hidden', '');
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('aria-label', 'Show paper details');
        btn.setAttribute('title', 'Show details');
        if (arrow) arrow.innerHTML = '&#8897;';
      }
    });
  });
});
</script>

<!-- Fold/expand whole publication sections via the section heading -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.pub-head').forEach(function (h) {
    h.addEventListener('click', function () {
      var section = h.closest('.pub-section');
      var arrow = h.querySelector('.sec-arrow');
      var collapsed = section.classList.toggle('collapsed');
      if (arrow) arrow.innerHTML = collapsed ? '&#8897;' : '&#8896;';
    });
  });
});
</script>

<!-- end custom footer snippets -->
